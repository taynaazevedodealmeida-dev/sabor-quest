function fit(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  cv.style.width  = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
}

/* ---------------------------------------------------------------------
   2. ÁUDIO — sons simples com Web Audio API
--------------------------------------------------------------------- */
let AC = null, MASTER = null;
function audio(){
  if(!AC){
    AC = new (window.AudioContext || window.webkitAudioContext)();
    // mixer com compressor: vários sons juntos não estouram/distorcem
    const comp = AC.createDynamicsCompressor();
    MASTER = AC.createGain(); MASTER.gain.value = 0.8;
    MASTER.connect(comp); comp.connect(AC.destination);
  }
  if(AC.state === 'suspended') AC.resume();
  return AC;
}
// Toca um tom que desliza de f0 para f1
function tone(f0, f1, dur, type, vol, when){
  try{
    const a = audio(), t = a.currentTime + (when || 0);
    const o = a.createOscillator(), g = a.createGain();
    o.type = type;
    o.frequency.setValueAtTime(Math.max(f0,1), t);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1,1), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(MASTER);
    o.start(t); o.stop(t + dur + 0.05);
  }catch(e){ /* áudio bloqueado até a primeira interação — tudo bem */ }
}

  'arrowleft':'left','a':'left',
  'arrowright':'right','d':'right',
  'arrowup':'jump','w':'jump',' ':'jump',
  'j':'atk','x':'atk',
  'k':'shield','c':'shield',
  'enter':'ok',
  'escape':'esc',
  'h':'help','?':'help'
};
addEventListener('keydown', e=>{
  const k = KEYMAP[e.key.toLowerCase()];
  if(k){ audio(); if(!keys[k]) jp[k] = true; keys[k] = true; e.preventDefault(); }
});
addEventListener('keyup', e=>{
  const k = KEYMAP[e.key.toLowerCase()];
  if(k){ keys[k] = false; }
});
// se a janela perde o foco, solta todas as teclas (evita tecla "presa")
addEventListener('blur', ()=>{ for(const k in keys) keys[k] = false; });

  const on  = e=>{ e.preventDefault(); audio(); if(!keys[k]) jp[k]=true; keys[k]=true; };
  const off = e=>{ e.preventDefault(); keys[k]=false; };
  el.addEventListener('pointerdown', on);
  el.addEventListener('pointerup',   off);
  el.addEventListener('pointercancel', off);
  el.addEventListener('pointerleave',  off);

const SKIP_BTN = { x:W-170, y:14, w:152, h:38 };
const HELP_BTN = { x:16,    y:54, w:38,  h:38 };
function inRect(mx, my, r){ return mx>=r.x && mx<=r.x+r.w && my>=r.y && my<=r.y+r.h; }
// Toque/clique no canvas: detecta botões; fora do jogo = confirmar
cv.addEventListener('pointerdown', e=>{
  audio();
  const r  = cv.getBoundingClientRect();
  const mx = (e.clientX - r.left) * W / r.width;
  const my = (e.clientY - r.top)  * H / r.height;
  if(state === 'prologue' && inRect(mx,my,SKIP_BTN)){ jp.esc  = true; return; }
  if(state === 'play'     && inRect(mx,my,HELP_BTN)){ jp.help = true; return; }
  if(state !== 'play' || paused) jp.ok = true;
});

  return lv.foes.map(f=>{
    let r = 13;
    for(let rw=0; rw<ROWS; rw++){
      if(lv.grid[rw][f.col] !== ' '){ r = rw; break; }

    const h = f.t === 'tom' ? 26 : f.t === 'dum' ? 42 : 22;
    return { x:f.col*TILE+4, y:r*TILE-h, w:28, h,
             vx: f.t === 'dum' ? 0 : (f.t==='tom'?0.7:1.1)*(Math.random()<.5?1:-1),
             t:f.t, frozen:0, hidden:0, dead:false,
             // patrulha perto do posto: inimigo não vagueia até o spawn
             bound: f.bound || [(f.col-5)*TILE, (f.col+5)*TILE] };
  });
}

/* ---------------------------------------------------------------------
   6. FÍSICA E COLISÃO
--------------------------------------------------------------------- */
function cellAt(px, py){
  const c = Math.floor(px/TILE), r = Math.floor(py/TILE);
  if(c < 0 || c >= lv.cols) return '#';             // paredes nas bordas
  // Portão do boss: sólido enquanto o boss vive
  if(lv.barrier !== null && boss && !boss.dead &&
     c >= lv.barrier && c <= lv.barrier+1 && r >= 8 && r < ROWS) return '#';
  if(r < 0 || r >= ROWS) return ' ';
  return lv.grid[r][c];
}
function solidAt(px, py){ return cellAt(px, py) === '#'; }   // bloqueia em todas as direções
function standAt(px, py){                                    // dá para pisar em cima
  const ch = cellAt(px, py); return ch === '#' || ch === '=';
}
// Move um retângulo com colisão nos tiles. Retorna flags.
// Plataformas '=' são "1-via": atravessa por baixo/lados, pousa por cima.
function moveRect(e){
  const out = { wall:false, ground:false, ceil:false };
  const prevB = e.y + e.h;                          // base antes de mover
  // eixo X
  e.x += e.vx;
  if(e.vx > 0){
    if(solidAt(e.x+e.w, e.y+2) || solidAt(e.x+e.w, e.y+e.h/2) || solidAt(e.x+e.w, e.y+e.h-2)){
      e.x = Math.floor((e.x+e.w)/TILE)*TILE - e.w - 0.01; out.wall = true;
    }
  }else if(e.vx < 0){
    if(solidAt(e.x, e.y+2) || solidAt(e.x, e.y+e.h/2) || solidAt(e.x, e.y+e.h-2)){
      e.x = (Math.floor(e.x/TILE)+1)*TILE + 0.01; out.wall = true;
    }
  }
  // eixo Y
  e.y += e.vy;
  if(e.vy > 0){
    let land = false;
    for(const fx of [e.x+2, e.x+e.w/2, e.x+e.w-2]){
      const ch = cellAt(fx, e.y+e.h);
      if(ch === '#'){ land = true; break; }
      // plataforma: só pousa se vinha de cima dela
      if(ch === '=' && prevB <= Math.floor((e.y+e.h)/TILE)*TILE + 4){ land = true; break; }
    }
    if(land){
      e.y = Math.floor((e.y+e.h)/TILE)*TILE - e.h - 0.01; e.vy = 0; out.ground = true;
    }
  }else if(e.vy < 0){
    if(solidAt(e.x+2, e.y) || solidAt(e.x+e.w/2, e.y) || solidAt(e.x+e.w-2, e.y)){
      e.y = (Math.floor(e.y/TILE)+1)*TILE + 0.01; e.vy = 0; out.ceil = true;
    }
  }
  return out;
}
function overlap(a, b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

/* ---------------------------------------------------------------------
   7. PARTÍCULAS
--------------------------------------------------------------------- */
function puff(x, y, color, n){
  for(let i=0; i<(n||8); i++){
    parts.push({ x, y, vx:(Math.random()-.5)*5, vy:-Math.random()*4-1,
                 life:30+Math.random()*20, color, kind:'dot' });
  }
}
function heartBurst(x, y, n){
  for(let i=0; i<n; i++){
    parts.push({ x:x+(Math.random()-.5)*40, y, vx:(Math.random()-.5)*1.5,
                 vy:-1-Math.random()*1.5, life:70+Math.random()*40, kind:'heart' });
  }
}
function confettiRain(cx0){
  const colors = [IT_GREEN, IT_WHITE, IT_RED];
  for(let i=0; i<3; i++){
    parts.push({ x:cx0+Math.random()*W, y:-10, vx:(Math.random()-.5)*1.5,
                 vy:1.5+Math.random()*2, life:200, kind:'conf',
                 color:colors[(Math.random()*3)|0], spin:Math.random()*6 });
  }
}
function updateParts(){
  for(const p of parts){
    p.x += p.vx; p.y += p.vy; p.life--;
    if(p.kind === 'dot')  p.vy += 0.2;
    if(p.kind === 'conf') p.x += Math.sin((p.life+p.spin*10)*0.1)*1.2;
  }
  parts = parts.filter(p => p.life > 0);
}

/* ---------------------------------------------------------------------
   8. LÓGICA DO JOGADOR
--------------------------------------------------------------------- */
function hurtPlayer(){
  if(player.inv > 0) return;
  if(keys.shield){                                  // 🛡️ bloqueado!
    if(player.blockCd <= 0){ S.clang(); player.blockCd = 18; }
    player.vx = -player.face*4; return;
  }
  player.hearts--; player.inv = 90;
  player.vx = -player.face*5; player.vy = -5;
  player.kbT = 12; shake = 10;    // hitstun + tremor de tela
  S.hurt();
  if(player.hearts <= 0){ state = 'gameover'; stateT = 0; S.over(); }
}
function fellInPit(){
  player.hearts--;
  S.hurt();
  if(player.hearts <= 0){ state = 'gameover'; stateT = 0; S.over(); return; }
  resetPlayer(); player.inv = 90;
}
function applyFood(t){
  foods++;
  if(t === 'M'){ player.speedT = 600; S.power(); }                    // 🍝 10s
  else if(t === 'P'){ player.weapon = {t:'pizza',  time:900}; S.power(); } // 🍕 15s
  else if(t === 'G'){ player.weapon = {t:'gelato', time:900}; S.power(); } // 🍦 15s
  else if(t === 'H'){                                                 // 🍰 cura 1 ❤️
    if(player.hearts < 3){ player.hearts++; heartBurst(player.x+13, player.y, 3); }
    S.heal();
  }
  S.coin();
}
function swordBox(){
  // o golpe cobre o próprio corpo + alcance à frente:
  // inimigo grudado no Filipe também é atingido (sem "fantasmas")
  const reach = 34;
  return player.face > 0
    ? { x:player.x-4,     y:player.y+4, w:player.w+reach+4, h:player.h*0.8 }
    : { x:player.x-reach, y:player.y+4, w:player.w+reach+4, h:player.h*0.8 };
}
function hitFoe(f){
  if(lv.tutorial) f.hidden = 150;       // no treino o boneco reaparece
  else f.dead = true;
  puff(f.x+f.w/2, f.y+f.h/2,
       f.t==='tom' ? '#d63031' : f.t==='dum' ? '#e8d29a' : '#6b8e23', 10);
  S.foeDie();
}
function hitBoss(){
  if(boss.inv > 0 || boss.dead) return;
  boss.hp--; boss.inv = 45;
  puff(boss.x+boss.w/2, boss.y+30, '#fff', 10);
  S.bossHit();
  if(boss.hp <= 0){
    boss.dead = true;
    puff(boss.x+boss.w/2, boss.y+boss.h/2, '#fff', 25);
    heartBurst(boss.x+boss.w/2, boss.y, 10);
    S.win();
  }
}

function updatePlay(){
  // ------- movimento -------
  if(shake > 0) shake--;
  const spd = (player.speedT > 0 ? RUNV : WALK) * (keys.shield ? 0.6 : 1);
  if(player.kbT > 0){ player.kbT--; player.vx *= 0.92; }  // empurrão do dano
  else{
    player.vx = 0;
    if(keys.left ){ player.vx = -spd; player.face = -1; }
    if(keys.right){ player.vx =  spd; player.face =  1; }
  }
  player.walking = player.vx !== 0 && player.kbT === 0;

  // buffer de pulo (apertar um pouco antes de pousar vale) + coyote time
  // (pular logo depois de sair da beirada ainda funciona)
  if(jp.jump) player.jumpBuf = 7;
  else if(player.jumpBuf > 0) player.jumpBuf--;
  player.coyote = player.onGround ? 8 : Math.max(0, player.coyote - 1);
  if(player.jumpBuf > 0 && player.coyote > 0){
    player.vy = JUMPV; player.jumpT = 0; player.jumpBuf = 0; player.coyote = 0;
    S.jump();
  }
  player.jumpT++;
  // pulo variável: soltar cedo encurta o pulo, mas com 10 frames de carência
  // para que um toque rápido (celular!) ainda dê um pulo decente
  if(!keys.jump && player.vy < -4 && player.jumpT > 10) player.vy = -4;
  player.vy = Math.min(player.vy + GRAV, 14);

  const wasGround = player.onGround, fallVy = player.vy;
  const m = moveRect(player);
  player.onGround = m.ground;
  // poeirinha ao correr e ao pousar de uma queda
  if(player.onGround && player.walking && frame % 9 === 0)
    parts.push({ x:player.x+13-player.face*8, y:player.y+player.h-2,
                 vx:-player.face*0.6, vy:-0.8, life:18, color:'#d8c39a', kind:'dot' });
  if(player.onGround && !wasGround && fallVy > 7)
    puff(player.x+13, player.y+player.h-2, '#d8c39a', 5);

  // ------- ataque -------
  if(player.atkCd > 0) player.atkCd--;
  if(player.swordT > 0) player.swordT--;
  if(jp.atk && player.atkCd === 0 && !keys.shield){
    if(player.weapon){
      // 🍕/🍦 arremesso
      shots.push({ x:player.x + (player.face>0 ? player.w : -10),
                   y:player.y+16, w:12, h:12,
                   vx:8*player.face, t:player.weapon.t, life:80 });
      player.atkCd = 12; S.shoot();
    }else{
      player.swordT = 14; player.atkCd = 10; S.sword();
    }
  }

  // ------- timers -------
  if(player.inv > 0) player.inv--;
  if(player.blockCd > 0) player.blockCd--;
  if(player.speedT > 0) player.speedT--;
  if(player.weapon && --player.weapon.time <= 0) player.weapon = null;

  // ------- buraco -------
  if(player.y > H + 60){ fellInPit(); return; }

  // ------- comidas -------
  for(const it of lv.items){
    if(it.got) continue;
    if(Math.abs(player.x+13-it.x) < 34 && Math.abs(player.y+22-it.y) < 44){
      it.got = true; applyFood(it.t);
      puff(it.x, it.y, '#ffd700', 6);
    }
  }

  // ------- inimigos -------
  const sb = player.swordT > 2 ? swordBox() : null;
  // hitbox de dano do jogador um pouco menor que o sprite (mais justo)
  const pbox = { x:player.x+4, y:player.y+6, w:player.w-8, h:player.h-6 };
  for(const f of foes){
    if(f.dead) continue;
    if(f.hidden > 0){ f.hidden--; continue; }    // boneco de treino derrubado
    if(f.frozen > 0){ f.frozen--; }
    else if(f.t !== 'dum'){
      // anda; vira na parede ou na beirada
      const front = f.vx > 0 ? f.x+f.w+2 : f.x-2;
      if(solidAt(front, f.y+f.h/2) || !standAt(front, f.y+f.h+6)) f.vx = -f.vx;
      // patrulha limitada (tutorial)
      if(f.bound && (f.x < f.bound[0] || f.x > f.bound[1]))
        f.vx = Math.abs(f.vx) * (f.x < f.bound[0] ? 1 : -1);
      f.x += f.vx;
    }
    if(sb && overlap(sb, f)){ hitFoe(f); continue; }
    if(f.frozen <= 0 && overlap(pbox, f)){
      // pisão estilo Mario: cair em cima derrota o inimigo e quica
      if(player.vy > 2 && player.y + player.h < f.y + f.h){
        hitFoe(f); player.vy = -8.5; continue;
      }
      if(lv.tutorial || keys.shield){
        // escudo bloqueia e empurra o inimigo (no treino ninguém machuca)
        if(keys.shield){
          if(player.blockCd <= 0){ S.clang(); player.blockCd = 18; }
          f.vx = (f.x+f.w/2 < player.x+13) ? -Math.abs(f.vx||1) : Math.abs(f.vx||1);
        }
      }else hurtPlayer();
    }
  }
  foes = foes.filter(f => !f.dead);

  // ------- projéteis -------
  for(const s of shots){
    s.x += s.vx; s.life--;
    if(solidAt(s.x+s.w/2, s.y+s.h/2)) s.life = 0;
    for(const f of foes){
      if(f.dead || f.hidden > 0 || !overlap(s, f)) continue;
      if(s.t === 'gelato'){ f.frozen = 180; S.freeze(); }  // congela 3s ❄️
      else hitFoe(f);
      s.life = 0; break;
    }
    if(boss && !boss.dead && s.life > 0 && overlap(s, boss)){
      if(s.t === 'gelato'){ boss.frozen = 180; S.freeze(); }
      else hitBoss();
      s.life = 0;
    }
  }
  shots = shots.filter(s => s.life > 0);

  // ------- boss -------
  if(boss && !boss.dead){
    if(!boss.active && player.x > (lv.bossCol-17)*TILE){
      boss.active = true; S.bossHit();
    }
    if(boss.active){
      boss.t++;
      if(boss.inv > 0) boss.inv--;
      if(boss.frozen > 0){ boss.frozen--; boss.vx = 0; }
      else{
        const dir = player.x > boss.x ? 1 : -1;
        if(boss.chargeT > 0){ boss.chargeT--; }                 // investida!
        else if(boss.t % 180 === 0){ boss.chargeT = 55; }
        boss.vx = dir * (boss.chargeT > 0 ? 3.4 : 0.9);
      }
      boss.vy = Math.min(boss.vy + GRAV, 14);
      moveRect(boss);
      // o boss nunca sai da arena (sem cair no buraco perseguindo o Filipe!)
      boss.x = Math.max((lv.bossCol-22)*TILE,
               Math.min(boss.x, lv.barrier*TILE - boss.w - 6));
      if(sb && overlap(sb, boss)) hitBoss();
      if(boss.frozen <= 0 && overlap(player, boss)) hurtPlayer();
    }
  }

  // ------- bandeira (fases 1–5) -------
  if(lv.goal !== null && player.x + player.w > lv.goal*TILE + 10){
    state = 'cleared'; stateT = 0; S.win();
    heartBurst(player.x, player.y, 6);
  }
  // ------- portão do tutorial -------
  if(lv.gate && player.x + player.w > lv.gate*TILE + 30){
    state = 'cleared'; stateT = 0; S.win();
    heartBurst(player.x, player.y, 6);
  }

  // ------- Tayna (fase 6) -------
  if(lv.taynaCol !== null && boss && boss.dead){
    const tay = { x:lv.taynaCol*TILE, y:13*TILE-46, w:26, h:46 };
    if(overlap(player, tay)){
      state = 'ending'; stateT = 0;
      ending = { t:0, kissT:0 };
      player.vx = 0; S.kiss();
    }
  }

  // ------- câmera (suave) -------
  const camT = Math.max(0, Math.min(player.x - W*0.4, lv.cols*TILE - W));
  camX += (camT - camX) * 0.15;
  if(Math.abs(camT - camX) < 0.5) camX = camT;
  updateParts();
}

--------------------------------------------------------------------- */
function rr(x,y,w,h,color){ ctx.fillStyle = color; ctx.fillRect(x,y,w,h); }
function txt(s, x, y, size, color, align){
  ctx.font = 'bold ' + size + 'px "Courier New","Segoe UI Emoji",monospace';
  ctx.textAlign = align || 'center';
  ctx.fillStyle = color;
  ctx.fillText(s, x, y);
}
function txtShadow(s, x, y, size, color, align){
  ctx.font = 'bold ' + size + 'px "Courier New","Segoe UI Emoji",monospace';
  ctx.textAlign = align || 'center';
  ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fillText(s, x+3, y+3);
  ctx.fillStyle = color; ctx.fillText(s, x, y);
}

// FILIPE — guerreiro branco, cabelo castanho, MUITO musculoso 💪
function drawFilipe(px, py, opts){
  opts = opts || {};
  if(player.inv > 0 && (frame>>2) % 2 === 0 && !opts.cutscene) return; // pisca
  const f = opts.face || player.face;
  ctx.save();
  ctx.translate(px+13, py);
  ctx.scale(f, 1);
  const walk = opts.walking ? Math.sin(frame*0.35)*3 : 0;

  // capa vermelha esvoaçante
  rr(-13, 15, 7, 20 + Math.sin(frame*0.15)*1.5, '#a32638');
  // escudo nas costas (quando não está bloqueando)
  if(!opts.shield) drawShield(-19, 17);

  // pernas (calça verde + botas)
  rr(-8+walk, 34, 7, 7, '#2e7d32'); rr(-8+walk, 41, 7, 3, '#5d3a1a');
  rr( 1-walk, 34, 7, 7, '#2e7d32'); rr( 1-walk, 41, 7, 3, '#5d3a1a');

  // torso musculoso: ombros largos, peitoral, abdômen trincado
  rr(-13, 14, 26, 5, '#f6c89f');               // deltoides
  rr(-10, 16, 20, 9, '#f6c89f');               // peitoral
  rr(-1,  17, 2, 7,  '#e0a878');               // divisão dos peitos
  rr(-10, 23, 20, 2, '#e0a878');
  rr(-7,  25, 14, 9, '#f6c89f');               // abdômen
  rr(-7,  28, 14, 1, '#e0a878');               // gominhos
  rr(-7,  31, 14, 1, '#e0a878');
  rr(-1,  25, 2, 9,  '#e0a878');
  // faixa de couro no peito
  rr(-10, 16, 4, 18, '#7a4a21');
  // cinto
  rr(-8, 33, 16, 3, '#5d4037'); rr(-2, 33, 4, 3, '#f5c518');

  // braço de trás (escudo)
  rr(-16, 16, 6, 8, '#e0a878'); rr(-16, 24, 5, 7, '#e0a878');
  if(opts.shield) drawShield(8, 14);           // 🛡️ na frente, bloqueando
  // braço da frente (espada) — bíceps grande!
  rr(10, 15, 7, 9, '#f6c89f'); rr(11, 24, 5, 6, '#f6c89f');

  // espada ⚔️
  if(opts.attacking){
    // rastro luminoso do golpe
    ctx.strokeStyle = 'rgba(255,255,255,.6)'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(6, 20, 30, -1.3, 0.5); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,.22)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(6, 20, 23, -1.3, 0.5); ctx.stroke();
    rr(14, 19, 24, 5, '#dfe6ee'); rr(36, 20, 5, 3, '#fff');
    rr(12, 17, 4, 9, '#f5c518');
  }else{
    rr(13, 8, 4, 18, '#dfe6ee'); rr(13, 6, 4, 3, '#fff');
    rr(10, 24, 10, 3, '#f5c518'); rr(13, 27, 4, 4, '#7a4a21');
  }

  // cabeça: pele clara + cabelo castanho
  rr(-7, 3, 14, 11, '#f6c89f');
  rr(-8, 0, 16, 5, '#5d3a1a'); rr(-8, 5, 3, 4, '#5d3a1a');
  rr(2, 7, 3, 3, '#fff'); rr(3, 8, 2, 2, '#3a2a1a');   // olho
  rr(0, 12, 5, 1, '#c98a64');                           // sorriso

// Primeiro chão/plataforma abaixo de um ponto (px,py), em pixels
function groundYBelow(px, py){
  for(let r = Math.max(0, Math.floor(py/TILE)); r < ROWS; r++){
    if(standAt(px, r*TILE + 2)) return r*TILE;

// BOSS — Chef Ciúme 👨‍🍳
function drawBoss(b){

const PRO_TEXTS = [
  'Há muito, muito tempo... dois desconhecidos se encontraram.',
  'Entre conversas e risadas, nasceu algo especial...',
  'Mas o destino separou os dois por 6 reinos cheios de perigos.',
  'Agora, o guerreiro Filipe parte em sua jornada...',
  '...para reencontrar seu grande amor: a princesa Tayna.'
];
let pro = { panel:0, chars:0 };

// quebra texto em linhas de no máximo `max` caracteres
function wrap(s, max){
  const words = s.split(' '), lines = []; let cur = '';
  for(const w of words){
    if((cur + ' ' + w).trim().length > max){ lines.push(cur.trim()); cur = w; }
    else cur += ' ' + w;
  }
  if(cur.trim()) lines.push(cur.trim());
  return lines;
}

function updatePrologue(){
  // 🎵 música suave de fundo (harpa sintetizada)
  const MEL = [523, 440, 392, 440, 523, 587, 659, 587];
  if(frame % 26 === 0){
    const n = MEL[((frame/26)|0) % MEL.length];
    tone(n, n, .5, 'sine', .04);
  }
  if(frame % 104 === 0){
    const b = ((frame/104)|0) % 2 ? 98 : 131;
    tone(b, b, 1.0, 'sine', .05);
  }
  // texto letra por letra, com bliquezinho
  const len = PRO_TEXTS[pro.panel].length;
  const before = pro.chars | 0;
  if(pro.chars < len) pro.chars += 0.65;
  if((pro.chars|0) !== before && (pro.chars|0) % 3 === 0)
    tone(880, 880, .03, 'square', .012);

  if(jp.esc){ state = 'title'; stateT = 0; return; }   // Pular
  if(jp.ok || jp.jump || jp.atk){
    if(pro.chars < len) pro.chars = len;               // completa o texto
    else{
      pro.panel++; pro.chars = 0;
      if(pro.panel >= PRO_TEXTS.length){
        pro.panel = PRO_TEXTS.length - 1;
        state = 'title'; stateT = 0;
      }
    }
  }
}

    'K ou C (segurar)  —  escudo',

    '? ou H  —  esta ajuda'];
  const tc = ['📱  TOQUE (celular)',
    '◀ ▶  —  andar',
    '⬆  —  pular',
    '⚔️  —  atacar / arremessar',
    '🛡️ (segurar)  —  escudo',
    'toque na tela  —  confirmar',
    'botão "?"  —  esta ajuda'];
  for(let i=0; i<kb.length; i++){
    txt(kb[i], 90,  112 + i*32, i ? 17 : 19, i ? '#fff' : '#ffd76e', 'left');
    txt(tc[i], 530, 112 + i*32, i ? 17 : 19, i ? '#fff' : '#ffd76e', 'left');
  }
  txtShadow('🍝 corre 10s   🍕 pepperoni 15s   🍦 congela 3s   🍰 +1 ❤️', W/2, 392, 18, '#ffe28a');
  txt('Você tem 3 corações ❤️ — encostar em inimigos tira 1.', W/2, 428, 16, '#ffb3c1');
  txt('O escudo 🛡️ bloqueia todo o dano!', W/2, 456, 16, '#ffb3c1');
  if(frame % 60 < 36) txt('? / ENTER / toque ▸ voltar ao jogo', W/2, 505, 16, '#fff');
}

/* ---------------------------------------------------------------------
   10d. TUTORIAL — placas com balões e portão final
--------------------------------------------------------------------- */
function drawSigns(){
  if(!lv.signs) return;
  for(const sg of lv.signs){
    const sx = sg.c*TILE - camX, gy = 13*TILE;
    if(sx < -260 || sx > W+260) continue;
    rr(sx+14, gy-26, 8, 26, '#7a4a21');                 // poste
    rr(sx-2,  gy-54, 40, 30, '#cfa15a');                // tabuleta
    ctx.strokeStyle = '#7a4a21'; ctx.lineWidth = 3;
    ctx.strokeRect(sx-2, gy-54, 40, 30);
    txt('!', sx+18, gy-32, 20, '#7a3014');
    // balão de fala quando o Filipe chega perto
    if(Math.abs((player.x+13) - (sg.c*TILE+18)) < 95){
      const bw = Math.max(...sg.lines.map(l => l.length)) * 10.5 + 28;
      const bh = sg.lines.length * 24 + 16;
      let bx = sx + 18 - bw/2;
      bx = Math.max(8, Math.min(bx, W - bw - 8));
      const by = gy - 70 - bh;
      rr(bx, by, bw, bh, '#fff');
      ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle = '#fff'; ctx.beginPath();          // rabinho do balão
      ctx.moveTo(sx+8, gy-70); ctx.lineTo(sx+28, gy-70); ctx.lineTo(sx+18, gy-52);
      ctx.fill();
      for(let i=0; i<sg.lines.length; i++)
        txt(sg.lines[i], bx + bw/2, by + 26 + i*24, 16, '#222');
    }
  }
}
function drawTutGate(){
  if(!lv.gate) return;
  const x = lv.gate*TILE - camX, base = 13*TILE;
  if(x < -200 || x > W+200) return;
  rr(x-10, base-150, 14, 150, '#7a4a21');               // pilares
  rr(x+68, base-150, 14, 150, '#7a4a21');
  rr(x-18, base-172, 108, 26, '#5d3a1a');               // arco
  rr(x-10, base-146, 30, 8, IT_GREEN);
  rr(x+20, base-146, 30, 8, IT_WHITE);
  rr(x+50, base-146, 32, 8, IT_RED);
  txtShadow('Pronto para a aventura!', x+36, base-182, 16, '#ffd76e');
  if(frame % 8 < 4) txt('✨', x+36, base-90, 26);
}

/* ---------------------------------------------------------------------
   11. TELAS (título, intro, game over, final)
--------------------------------------------------------------------- */
function drawItalyFlag(x, y, w, h){
  rr(x, y, w/3, h, IT_GREEN); rr(x+w/3, y, w/3, h, IT_WHITE); rr(x+2*w/3, y, w/3, h, IT_RED);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
}
// Tela de título estilo Mario Bros clássico 🍄
function drawTitle(){
  rr(0, 0, W, H, '#5c94fc');                            // céu azul clássico
  // nuvens passando
  for(let i=0; i<4; i++){
    const cx0 = ((i*260 - frame*0.4) % (W+160) + W+160) % (W+160) - 160;
    rr(cx0, 56+i*34, 86, 20, 'rgba(255,255,255,.9)');
    rr(cx0+18, 44+i*34, 50, 16, 'rgba(255,255,255,.9)');
  }
  // chão de tijolos rolando
  const off = (frame*2.5) % TILE;
  for(let x = -TILE; x < W+TILE; x += TILE){
    const gx = x - off;
    rr(gx, H-72, TILE, 14, '#3faf4e'); rr(gx, H-60, TILE, 2, '#2c8a3a');
    rr(gx, H-58, TILE, 58, '#8a5a2b');
    rr(gx+4, H-50, 10, 6, '#76491f'); rr(gx+20, H-34, 10, 6, '#76491f');
  }
  // arbustos
  ctx.fillStyle = '#2c8a3a';
  for(let i=0; i<3; i++){
    const bx = ((i*420+120 - frame*2.5) % (W+220) + W+220) % (W+220) - 110;
    ctx.beginPath(); ctx.arc(bx, H-72, 26, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(bx+32, H-72, 20, Math.PI, 0); ctx.fill();
  }
  // Filipe correndo sem parar 🏃
  miniF(((frame*2.5) % (W+180)) - 90, H-72-88, 2, { face:1, walking:true });
  // comidas flutuando
  ['🍝','🍕','🍦'].forEach((e,i) => txt(e, 130+i*350, 110 + Math.sin(frame*0.05+i)*10, 30));

  // LOGO grande estilo Mario
  rr(W/2-312, 84, 624, 144, '#7a1c12');
  rr(W/2-306, 90, 612, 132, '#b13425');
  ctx.strokeStyle = '#ffd76e'; ctx.lineWidth = 6;
  ctx.strokeRect(W/2-300, 96, 600, 120);
  txtShadow('SABOR QUEST', W/2, 170, 62, '#ffd76e');
  txtShadow('A Jornada do Filipe', W/2, 206, 22, '#fff');
  drawItalyFlag(W/2-286, 108, 56, 34);
  drawItalyFlag(W/2+230, 108, 56, 34);

  // PRESS START piscando
  if(frame % 60 < 36) txtShadow('PRESS START', W/2, 300, 36, '#fff');
  txt('ENTER ou toque na tela', W/2, 334, 15, 'rgba(255,255,255,.85)');
  txtShadow('6 meses de sabor namoro 💘', W/2, 382, 18, '#ffd6e0');
  txt('© 2026 TAYNA ♥ FILIPE', W/2, H-16, 14, '#fff');
}
function drawIntro(){
  rr(0, 0, W, H, '#3b1020');                            // cortina
  for(let i=0;i<W;i+=60) rr(i, 0, 30, H, 'rgba(0,0,0,.15)');
  // pergaminho
  rr(110, 110, W-220, 300, '#f3e3c3');
  rr(110, 110, W-220, 10, '#d8c39a'); rr(110, 400, W-220, 10, '#d8c39a');
  ctx.strokeStyle = '#a8895a'; ctx.lineWidth = 4;
  ctx.strokeRect(110, 110, W-220, 300);
  txt('— Capítulo ' + (levelIdx+1) + ' —', W/2, 170, 20, '#a8412e');
  txt('❦', W/2, 205, 24, '#a8895a');
  // o texto da história
  ctx.font = 'italic bold 26px Georgia, serif';
  ctx.textAlign = 'center'; ctx.fillStyle = '#4a2e15';
  ctx.fillText(LEVELS[levelIdx].text, W/2, 270);
  txt('❤️', W/2, 330, 28);
  if(frame % 60 < 36) txt('ENTER ▸ ou toque para começar', W/2, 460, 17, '#ffd6e0');
}
function drawCleared(){
  ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillRect(0, H/2-80, W, 160);
  if(lv.tutorial){
    txtShadow('Pronto para a aventura! 🇮🇹', W/2, H/2, 38, '#ffd76e');
    txtShadow('A história começa agora...', W/2, H/2+45, 20, '#fff');
  }else{
    txtShadow('Fase ' + (levelIdx+1) + ' completa! 🍷❤️', W/2, H/2, 40, '#ffd76e');
    txtShadow('Mamma mia, che amore!', W/2, H/2+45, 20, '#fff');
  }
}
function drawGameOver(){
  ctx.fillStyle = 'rgba(20,5,10,.85)'; ctx.fillRect(0,0,W,H);
  txt('💔', W/2, 180, 64);
  txtShadow('Tenta de novo, amore!', W/2, 260, 44, IT_RED);
  txtShadow('O amor não desiste nunca ❤️', W/2, 310, 20, '#ffb3c1');
  if(frame % 60 < 36) txt('ENTER ▸ ou toque para recomeçar', W/2, 400, 18, '#fff');
}

/* ---------------------------------------------------------------------
   12. FINAL — o beijo 💋
--------------------------------------------------------------------- */
function updateEnding(){
  ending.t++;
  const tayX = lv.taynaCol*TILE;
  const meetX = tayX - 34;
  if(player.x < meetX){                                 // Filipe corre pra ela
    player.x += 2.2; player.face = 1; player.walking = true;
  }else{
    player.walking = false;
    ending.kissT++;
    if(ending.kissT === 1) S.kiss();
    if(ending.kissT % 12 === 0) heartBurst(tayX - 10, player.y - 10, 2);
  }
  confettiRain(camX);                                   // 🇮🇹 confete!
  camX = Math.max(0, Math.min(tayX - W*0.55, lv.cols*TILE - W));
  updateParts();
  if(ending.kissT > 240 && jp.ok) fullReset();
}
function drawEnding(){
  drawBackground(); drawTiles(); drawGate();
  const tayX = lv.taynaCol*TILE - camX, tayY = 13*TILE - 46;
  const kissing = ending.kissT > 0;

  // Tayna se inclina para o beijo
  drawTayna(tayX + (kissing ? -4 : 0), tayY, { face:-1 });
  drawFilipe(player.x - camX, player.y, { cutscene:true, walking:player.walking, face:1 });

  if(kissing){
    // o coração do beijo 💋
    const pulse = 34 + Math.sin(ending.kissT*0.15)*8;
    txt('❤️', tayX - 8, player.y - 28, pulse);
    if(ending.kissT > 30) txt('💋', tayX - 8, player.y - 64, 24);
  }
  drawParts();

  if(ending.kissT > 80){
    ctx.globalAlpha = Math.min(1, (ending.kissT-80)/50);
    ctx.fillStyle = 'rgba(40,5,25,.55)'; ctx.fillRect(0, 60, W, 190);
    txtShadow('Feliz Dia dos Namorados,', W/2, 130, 36, '#ffd76e');
    txtShadow('meu sabor namorado ❤️', W/2, 180, 36, '#ff8fab');
    txtShadow('6 meses de sabor namoro 🍝🍕🍦', W/2, 225, 20, '#fff');
    ctx.globalAlpha = 1;
  }
  if(ending.kissT > 180){
    txtShadow('Comidas coletadas: ' + foods + ' 😋', W/2, 480, 16, '#fff');
  }
  if(ending.kissT > 240 && frame % 60 < 36){
    txt('ENTER ▸ jogar de novo', W/2, 515, 15, 'rgba(255,255,255,.8)');
  }
}

/* ---------------------------------------------------------------------
   13. RENDER DO JOGO
--------------------------------------------------------------------- */
function drawPlay(){
  drawBackground();
  ctx.save();
  if(shake > 0) ctx.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake);
  drawTiles();
  drawFlag();
  drawGate();
  drawSigns();
  drawTutGate();
  drawItems();
  // Tayna esperando atrás do portão (fase 6)
  if(lv.taynaCol !== null){
    drawShadow(lv.taynaCol*TILE+13 - camX, 13*TILE, 13);
    drawTayna(lv.taynaCol*TILE - camX, 13*TILE - 46, { face:-1 });
  }
  for(const f of foes){
    if(f.hidden > 0) continue;
    drawShadow(f.x+f.w/2 - camX, f.y+f.h+4, f.w*0.45);
    if(f.t === 'dum') drawDum(f);
    else if(f.t === 'tom') drawTom(f);
    else drawOli(f);
  }
  if(boss && boss.active && !boss.dead){
    drawShadow(boss.x+boss.w/2 - camX, boss.y+boss.h+4, 34);
    drawBoss(boss);
  }
  drawShots();
  drawParts();
  // sombra do Filipe projetada no chão abaixo dele
  const sgy = groundYBelow(player.x+13, player.y+player.h);
  if(sgy > 0){
    const d = Math.max(0.25, 1 - (sgy - (player.y+player.h)) / 220);
    drawShadow(player.x+13 - camX, sgy, 14*d, d);
  }
  drawFilipe(player.x - camX, player.y, {
    walking: player.walking && player.onGround,
    attacking: player.swordT > 0,
    shield: keys.shield
  });
  ctx.restore();
  drawHUD();
}

/* ---------------------------------------------------------------------
   14. LOOP PRINCIPAL
--------------------------------------------------------------------- */
function tick(){
  frame++; stateT++;

  if(state === 'prologue'){
    updatePrologue();
    if(state === 'prologue') drawPrologue(); else drawTitle();
  }
  else if(state === 'title'){
    if(jp.ok || jp.jump || jp.atk){ foods = 0; startTutorial(); }
    drawTitle();
  }
  else if(state === 'intro'){
    if(stateT > 20 && (jp.ok || jp.jump || jp.atk)){ state = 'play'; stateT = 0; }
    drawIntro();
  }
  else if(state === 'play'){
    if(jp.help) paused = !paused;                  // botão "?" pausa/despausa
    else if(paused && (jp.ok || jp.esc)) paused = false;
    if(!paused) updatePlay();
    drawPlay();
    if(paused) drawHelp();
  }
  else if(state === 'cleared'){
    updateParts();
    drawPlay(); drawCleared();
    if(stateT > 140) startLevel(levelIdx + 1);
  }
  else if(state === 'gameover'){
    drawPlay(); drawGameOver();
    if(stateT > 30 && (jp.ok || jp.jump || jp.atk)) startLevel(levelIdx);
  }
  else if(state === 'ending'){
    updateEnding();
    drawEnding();
  }

  for(const k in jp) jp[k] = false;   // limpa "just pressed"
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
